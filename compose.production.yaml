services:
  app:
    build:
      context: .
      target: runtime
    image: obecnosc:production
    env_file:
      - /etc/obecnosc/obecnosc.env
    ports:
      - "127.0.0.1:8788:3000"
    volumes:
      - /srv/obecnosc/data:/data
      - /srv/backups/obecnosc:/backups
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
