<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lista obecności</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <section id="student-view">
      <header><h1>Lista obecności</h1></header>
      <div class="content">
        <div id="student-message" class="message" hidden></div>
        <div id="closed-notice" class="empty"><h2>Lista jest aktualnie zamknięta</h2><p>Poczekaj, aż prowadzący otworzy rejestrację.</p></div>
        <form id="attendance-form" hidden>
          <p class="lead">Wpisz swoje dane, aby potwierdzić obecność na zajęciach.</p>
          <label>Imię<input name="firstName" autocomplete="given-name" required></label>
          <label>Nazwisko<input name="lastName" autocomplete="family-name" required></label>
          <button>Potwierdzam obecność</button>
        </form>
        <section id="student-stats" class="stats" hidden></section>
      </div>
    </section>
    <section id="admin-view" hidden>
      <header class="dark"><h1>Panel prowadzącego</h1><p>Zarządzanie sesją obecności</p></header>
      <div class="content">
        <form id="login-form">
          <div id="login-message" class="message" hidden></div>
          <label>Hasło dostępowe<input id="password" type="password" autocomplete="current-password" required autofocus></label>
          <button>Zaloguj się</button>
        </form>
        <section id="admin-panel" hidden>
          <div class="toolbar"><strong>Konfiguracja sesji</strong><button id="logout" class="secondary small" type="button">Wyloguj</button></div>
          <div id="admin-message" class="message" hidden></div>
          <form id="state-form">
            <label>Wybierz kurs<select id="course-select" required><option value="">— Wybierz kurs —</option></select></label>
            <label>Wybierz sesję<select id="session-select" required disabled><option value="">— Najpierw wybierz kurs —</option></select></label>
            <label class="switch"><input id="is-open" type="checkbox"><span>Lista obecności otwarta</span></label>
            <p id="countdown" class="hint" hidden></p>
            <button>Zapisz ustawienia</button>
          </form>
          <hr>
          <h2>Obecność na żywo</h2><div id="live-stats" class="live">Ładowanie…</div>
        </section>
      </div>
      <footer><a href="./">Widok studenta</a></footer>
    </section>
  </main>
  <a class="admin-toggle" href="?admin=1" aria-label="Panel prowadzącego" title="Panel prowadzącego">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"></path>
      <path d="M19.4 13a7.8 7.8 0 0 0 .05-1 7.8 7.8 0 0 0-.05-1l2.1-1.6a.5.5 0 0 0 .12-.64l-2-3.5a.5.5 0 0 0-.6-.22l-2.5 1a7.8 7.8 0 0 0-1.7-1l-.3-2.7a.5.5 0 0 0-.5-.45h-4a.5.5 0 0 0-.5.45l-.3 2.7a7.8 7.8 0 0 0-1.7 1l-2.5-1a.5.5 0 0 0-.6.22l-2 3.5a.5.5 0 0 0 .12.64L4.6 12a7.8 7.8 0 0 0-.05 1 7.8 7.8 0 0 0 .05 1l-2.1 1.6a.5.5 0 0 0-.12.64l2 3.5a.5.5 0 0 0 .6.22l2.5-1a7.8 7.8 0 0 0 1.7 1l.3 2.7a.5.5 0 0 0 .5.45h4a.5.5 0 0 0 .5-.45l.3-2.7a7.8 7.8 0 0 0 1.7-1l2.5 1a.5.5 0 0 0 .6-.22l2-3.5a.5.5 0 0 0-.12-.64Z"></path>
    </svg>
  </a>
  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
