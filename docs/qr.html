<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR dla studentów</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="qr-page">
  <main class="qr-card">
    <h1>QR do listy obecności</h1>
    <p>Studenci mogą użyć kodu albo linku. Z jednego telefonu można kolejno wpisać kilka osób.</p>
    <div class="qr-box"><img id="qr-image" src="/api/public/qr" alt="Kod QR do strony obecności"></div>
    <p id="status" class="muted" aria-live="polite">Ładowanie licznika…</p>
    <p><a id="student-link" href="./">Otwórz stronę dla studentów</a></p>
  </main>
  <script type="module" src="qr.js"></script>
</body>
</html>
