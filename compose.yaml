services:
  app:
    build:
      context: .
      target: runtime
    image: obecnosc:local
    environment:
      NODE_ENV: development
      PORT: 3000
      PUBLIC_URL: http://localhost:8788
      ALLOWED_ORIGIN: http://localhost:8788
      TRUST_PROXY: "false"
      DATABASE_PATH: /data/attendance.sqlite3
      MOODLE_BASE_URL: https://moodle2.e-wsb.pl
      MOODLE_TOKEN: ${MOODLE_TOKEN:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-development-password}
      AUTH_SECRET: ${AUTH_SECRET:-development-auth-secret-at-least-32-characters}
      MOODLE_PRESENT_STATUS_ACRONYM: ${MOODLE_PRESENT_STATUS_ACRONYM:-O}
      MOODLE_ABSENT_STATUS_ACRONYM: ${MOODLE_ABSENT_STATUS_ACRONYM:-N}
      MOODLE_STATUS_SET: ${MOODLE_STATUS_SET:-}
      MOODLE_TAKEN_BY_ID: ${MOODLE_TAKEN_BY_ID:-}
    ports:
      - "127.0.0.1:8788:3000"
    volumes:
      - ./data:/data
    restart: unless-stopped
